# -----------------------------------------------------------------------
# ⚙️ Site Configuration
# Guide: Modify this file to customize the core information of your website.
# -----------------------------------------------------------------------

site:
  name: '[Your Site Name]' # [Required] Your blog name (appears in the header & browser tab)
  site: 'https://your-domain.com' # [Required] Your live domain (essential for SEO and Sitemap)
  base: '/your-repo-name' # [Default]  Sub-path (usually '/', unless deployed at example.com/blog)
  trailingSlash: false # [Default]  Append trailing slash to URLs (recommended: false)

  subtitle: '[Your Tagline]' # [Optional] Custom homepage subtitle (fallbacks to SEO description if empty)

  googleSiteVerificationId: '' # [Optional] Google Search Console verification ID (leave empty if unused)

# -----------------------------------------------------------------------
# 🔍 SEO Metadata (Default)
# -----------------------------------------------------------------------
metadata:
  title:
    default: '[Your Site Name]' # [Required] Default page title
    template: '%s — [Your Site Name]' # [Required] Title template (%s = post title, followed by your brand)

  description: '[Your Site Description]' # [Required] Default site description (used for SEO & social sharing)

  robots:
    index: true
    follow: true

  openGraph:
    site_name: '[Your Site Name]' # [Required] OpenGraph site name (for social media)
    images:
      - url: '~/assets/images/default.png' # [Optional] Default sharing image (ensure this file exists in src/assets/images/)
        width: 1200
        height: 628
    type: website

  twitter:
    handle: '@your_handle' # [Optional] Your Twitter/X handle (leave empty if none)
    site: '@your_handle'
    cardType: summary_large_image

# -----------------------------------------------------------------------
# 🌍 Internationalization (i18n)
# -----------------------------------------------------------------------
i18n:
  language: en
  textDirection: ltr

# -----------------------------------------------------------------------
# 🚀 Blog Configuration (App Settings)
# -----------------------------------------------------------------------
apps:
  blog:
    isEnabled: true
    postsPerPage: 6 # [Default]  Number of posts to show per page

    post:
      isEnabled: true
      permalink: '/%slug%' # [Default]  Post URL structure (recommended '/%slug%')
      robots:
        index: true

    list:
      isEnabled: true
      pathname: '/' # [Required] Blog list path ('/' means home is the blog list)
      robots:
        index: true

    category:
      isEnabled: false # [Disabled] Set to 'true' if you want to use Categories
      pathname: 'category' # [Default]  URL prefix for category pages
      robots:
        index: true

    tag:
      isEnabled: true # [Enabled]  Using Tags for organization
      pathname: 'tag' # [Default]  URL prefix for tag pages
      robots:
        index: false # [SEO]      Generally false for tag pages to avoid duplicate content

    isRelatedPostsEnabled: true # [Optional] Show "Related Posts" at the bottom of articles
    relatedPostsCount: 4

# -----------------------------------------------------------------------
# 📈 Analytics
# -----------------------------------------------------------------------
analytics:
  vendors:
    googleAnalytics:
      id: null # [Optional] Enter your GA4 ID here (e.g., "G-XXXXXXXXXX")

# -----------------------------------------------------------------------
# 🎨 UI Theme
# -----------------------------------------------------------------------
ui:
  theme: 'system' # [Default]  Options: 'system', 'light', 'dark', 'muted'

# -----------------------------------------------------------------------
# 🔍 Schema.org 结构化数据配置 (GEO - 生成式引擎优化)
# -----------------------------------------------------------------------
# 这部分配置用于生成 Schema.org JSON-LD 结构化数据，有助于：
#  - 提高 AI 搜索引擎（如 GPT、Claude、Gemini）对你内容的理解
#  - 在搜索结果中显示更丰富的信息（面包屑、评分等）
#  - 提升 GEO (Generative Engine Optimization) 效果
#
# 快速开始：
#  1. 将 YOUR_SITE_NAME 替换为你的网站名称
#  2. 填写你的社交媒体链接（可选，但推荐填写）
#  3. logo 路径默认指向 /favicon.svg，确保 public 目录有此文件
# -----------------------------------------------------------------------
schema:
  # 组织信息（用于 Organization Schema）
  organization:
    name: 'YOUR_SITE_NAME'        # [Required] 网站/组织名称
    logo: '/favicon.svg'           # [Optional] Logo 路径（相对于 public 目录）
    email: 'YOUR_EMAIL@example.com' # [Optional] 联系邮箱

  # 社交媒体链接（用于 sameAs 属性）
  social:
    github: 'https://github.com/YOUR_USERNAME'    # [Optional] GitHub
    reddit: 'https://reddit.com/r/YOUR_SUBREDDIT'  # [Optional] Reddit
    twitter: 'https://twitter.com/YOUR_HANDLE'     # [Optional] Twitter/X
    linkedin: 'https://linkedin.com/in/YOUR_PROFILE' # [Optional] LinkedIn

  # Schema 功能开关
  features:
    enableAutoDetection: true     # [Default] 自动检测 FAQ/HowTo 格式并生成 Schema
    enableBreadcrumb: true        # [Default] 启用面包屑 Schema
