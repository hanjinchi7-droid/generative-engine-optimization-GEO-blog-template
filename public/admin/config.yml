  # ==============================================================================
  # Collection 3: Products/Services
  # ==============================================================================
  - name: "products"
    label: "Products"
    label_singular: "Product"
    description: "Product or service showcase articles"
    folder: "src/data/post/products"
    create: true
    slug: "{{slug}}"
    extension: "md"
